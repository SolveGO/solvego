services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solvego-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://db:3306/solvego
      DB_USERNAME: solvego
      DB_PASSWORD: solvego_password
      JWT_SECRET: local-docker-secret-key-local-docker-secret-key-123456
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: solvego-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: solvego
      MYSQL_USER: solvego
      MYSQL_PASSWORD: solvego_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - solvego-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "solvego", "-psolvego_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  solvego-db-data: