spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/solvego}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
jwt:
  secret: ${JWT_SECRET}
  expiration: 600000

springdoc:
  override-with-generic-response: false

server:
  port: 8080